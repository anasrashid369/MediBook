AWSTemplateFormatVersion: '2010-09-09'
Description: 'MediBook infrastructure - VPC, Security, IAM, Storage, and SNS'

Parameters:
  UserEmail:
    Type: String
    Default: m.anasrashid111@gmail.com
    Description: Email for appointment notifications

Resources:
  # --- NETWORKING ---
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: medibook-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: medibook-igw

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: us-east-1a
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: medibook-public-subnet

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: us-east-1b
      Tags:
        - Key: Name
          Value: medibook-private-subnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: medibook-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # --- SECURITY GROUPS ---
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP/HTTPS to ALB
      VpcId: !Ref VPC
      GroupName: medibook-alb-sg
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from ALB and SSH from specific IP
      VpcId: !Ref VPC
      GroupName: medibook-ec2-sg
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0 # UPDATE THIS to your specific IP for production

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Outbound traffic for Lambda to AWS Services
      VpcId: !Ref VPC
      GroupName: medibook-lambda-sg

  # --- IAM ROLES & POLICIES ---
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: MediBook-LambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: MediBook-LambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                Resource: 
                  - !GetAtt AppointmentsTable.Arn
                  - !GetAtt AuditLogTable.Arn
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref SecretConfig
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref SNSTopic
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  # --- STORAGE (DYNAMODB) ---
  AppointmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MediBook-Appointments
      AttributeDefinitions:
        - AttributeName: appointment_id
          AttributeType: S
        - AttributeName: appointment_date
          AttributeType: S
      KeySchema:
        - AttributeName: appointment_id
          KeyType: HASH
        - AttributeName: appointment_date
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

  AuditLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MediBook-AuditLog
      AttributeDefinitions:
        - AttributeName: log_id
          AttributeType: S
      KeySchema:
        - AttributeName: log_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  # --- SECRETS MANAGER ---
  SecretConfig:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: medibook/db-config
      SecretString: !Sub |
        {
          "tableName": "MediBook-Appointments",
          "region": "${AWS::Region}",
          "snsTopicArn": "${SNSTopic}"
        }

  # --- NOTIFICATIONS (SNS) ---
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: MediBook-Confirmations

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SNSTopic
      Endpoint: !Ref UserEmail
      Protocol: email

Outputs:
  VpcId:
    Value: !Ref VPC
  PublicSubnetId:
    Value: !Ref PublicSubnet
  SecretArn:
    Value: !Ref SecretConfig
